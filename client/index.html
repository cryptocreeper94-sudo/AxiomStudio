    <!-- DarkWave Studios Ecosystem Analytics -->
    <script>
      (function(){
        var appId = document.querySelector('meta[name="dw-app-id"]');
        var id = appId ? appId.content : window.location.hostname;
        function track(type, data) {
          try {
            navigator.sendBeacon('https://darkwavestudios.io/api/analytics', JSON.stringify({
              app: id, type: type, url: window.location.href,
              ref: document.referrer, ts: Date.now(), ...data
            }));
          } catch(e) {}
        }
        track('pageview');
        window.addEventListener('popstate', function(){ track('navigate'); });
        var origPush = history.pushState;
        history.pushState = function(){ origPush.apply(this, arguments); track('navigate'); };
      })();
    </script>
