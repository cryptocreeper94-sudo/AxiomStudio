<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axiom Studio — The Apex Predator IDE | DarkWave Studios</title>
  <meta name="description" content="Axiom Studio is the world's first offline-capable, deterministic AI knowledge engine with multi-agent coding. Claude Opus, Sonnet, GPT-4o — all in one IDE.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%2322d3ee'/><stop offset='100%25' stop-color='%238b5cf6'/></linearGradient></defs><polygon points='50,5 93,27.5 93,72.5 50,95 7,72.5 7,27.5' fill='none' stroke='url(%23g)' stroke-width='6'/><circle cx='50' cy='50' r='18' fill='url(%23g)'/></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <!-- UNIVERSAL PWA BACK-BUTTON PATCH -->
  <script>
    window.addEventListener('load', function() {
      if (window.history && window.history.pushState) {
        window.history.pushState({ pwa: true }, '');
        window.addEventListener('popstate', function(e) {
          window.dispatchEvent(new KeyboardEvent('keydown', { key: 'Escape', code: 'Escape', keyCode: 27, which: 27 }));
          const modals = document.querySelectorAll('.modal, [role="dialog"], .overlay, .popup, [data-state="open"]');
          modals.forEach(m => {
            const btn = m.querySelector('button.close, [aria-label="Close"], .close-button, [data-dismiss="modal"]');
            if (btn && typeof btn.click === 'function') btn.click();
          });
          window.history.pushState({ pwa: true }, '');
        });
      }
    });
  </script>
</head>
<body>

  <!-- React App mounts here — the full IDE UI -->
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <!-- Electron Startup Overlay -->
  <div id="electron-startup-overlay" style="
    display: none;
    position: fixed;
    inset: 0;
    background: #0d1117;
    z-index: 99999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: Inter, system-ui, sans-serif;
    color: #e6edf3;
  ">
    <div style="font-size: 22px; font-weight: 700; margin-bottom: 8px;">
      AXIOM <span style="color:#22d3ee">STUDIO</span>
    </div>
    <div id="electron-startup-status" style="font-size: 12px; color: #8b949e; margin-bottom: 24px;">
      Starting local engine...
    </div>
  </div>
  <script>
    if (navigator.userAgent.includes('Electron')) {
      const overlay = document.getElementById('electron-startup-overlay');
      overlay.style.display = 'flex';
      window.__axiomReady = () => { overlay.style.display = 'none'; };
      setTimeout(() => {
        const status = document.getElementById('electron-startup-status');
        if (status && overlay.style.display !== 'none') {
          status.textContent = 'Engine is taking longer than expected. Check that port 5100 is available.';
          status.style.color = '#f87171';
        }
      }, 15000);
    }
  </script>
  <script src="https://nexus.tlid.io/beacon.js" defer></script>
</body>
</html>
